<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" fill="#f8f6f2"/>

  <!-- construction hairlines -->
  <line x1="5" y1="6"  x2="27" y2="6"  stroke="#0a0a0a" stroke-width="0.5" opacity="0.10"/>
  <line x1="5" y1="16" x2="23" y2="16" stroke="#0a0a0a" stroke-width="0.5" opacity="0.10"/>

  <!-- F strokes -->
  <line x1="8"  y1="6"  x2="8"  y2="26" stroke="#0a0a0a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="8"  y1="6"  x2="24" y2="6"  stroke="#0a0a0a" stroke-width="1.6" stroke-linecap="round"/>
  <line x1="8"  y1="16" x2="20" y2="16" stroke="#0a0a0a" stroke-width="1.6" stroke-linecap="round"/>

  <!-- structural dots -->
  <circle cx="8"  cy="6"  r="2"   fill="#0a0a0a"/>
  <circle cx="8"  cy="16" r="2"   fill="#0a0a0a"/>
  <circle cx="20" cy="16" r="2"   fill="#0a0a0a"/>
  <circle cx="8"  cy="26" r="2"   fill="#0a0a0a"/>

  <!-- red accent — top-right node of the F -->
  <circle cx="24" cy="6"  r="2.5" fill="#d42b2b"/>
</svg>
